<!DOCTYPE html>
<meta charset="UTF-8">
<meta lang="en">
<html>  
    <head>  
        <title>Guess the Number</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body style="background-image: linear-gradient(to left,rgb(164, 152, 219), rgb(139, 139, 139), rgb(179, 143, 143));">
        <header>
        </header>
        
        <main class="GuessNumber">
            <h1 class="GTN">Guess The Number</h1>
            <h3>0 - 100</h3>
            <div class="parent">
                <div class="child"> 
                <input id="numberInput" type="number" class="center-input" title="center-input" placeholder="Enter number">
                <h2 id="tries">6</h2>
            </div>
            </div>
            <button class="confirm" onclick="Input()" type="button" id="confirm"> Confirm </button>
            <div id="container">
            </div>
        </main>

        <main class="RPSLayout">
            <h1 class="RPS">Rock, Papper & Scissor</h1>
            <img class="enemy" id="enemy"></img>
            <div class="options">
            <button class="PaperBtn" id="PaperBtn" onclick="PaperPress()"></button>
            <button class="RockBtn" id="RockBtn" onclick="RockPress()"></button>
            <button class="ScissorBtn" id="ScissorBtn" onclick="ScissorPress()"></button>
            </div>
            <button class="startRPS" onclick="StartGame()" id="startRPS">Start</button>
        </main>

        <footer>
            
        </footer>

        <script src="JavaScript.js"></script> 
        <script src="RPS.js"></script>
    </body>
</html>
